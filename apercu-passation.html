<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aperçu passation — Into The Shift</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fontsource/asap@5/index.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Asap',sans-serif;background:#eef0f4;min-height:100vh;color:#18375d}
.hbar{background:#fff;border-bottom:1px solid #e2e8f0;padding:11px 24px;text-align:center;position:sticky;top:0;z-index:10}
.hbar-title{font-size:13px;font-weight:600;color:#64748b}
.page{max-width:600px;margin:0 auto;padding:20px 16px 56px}
.card{background:#fff;border-radius:14px;padding:22px 20px;box-shadow:0 1px 8px rgba(0,0,0,.06);margin-bottom:12px}
.hero-wrap{border-radius:14px;overflow:hidden;box-shadow:0 1px 8px rgba(0,0,0,.06);margin-bottom:12px}
.hero-img{height:180px;background:linear-gradient(135deg,#18375d 0%,#0d4c72 50%,#007883 100%);display:flex;align-items:center;justify-content:center}
.hero-body{background:#fff;padding:22px 20px;text-align:center}
.hero-title{font-size:22px;font-weight:700;color:#18375d;margin-bottom:20px;line-height:1.3}
.hero-sup{font-size:12px;color:#94a3b8;margin-bottom:8px}
.btn{width:100%;padding:14px;border:none;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;font-family:'Asap',sans-serif;margin-top:4px}
.btn-primary{background:#18375d;color:#fff}
.btn-primary:disabled{background:#b8c4d4}
.q-text{font-size:15px;font-weight:800;line-height:1.5;margin-bottom:20px}
.ans{display:flex;gap:13px;padding:13px 15px;border:1.5px solid #e2e8f0;border-radius:10px;cursor:pointer;margin-bottom:8px;background:#fff}
.ans.sel{border-color:#18375d;background:#edf1f7}
.ans-num{width:30px;height:30px;border-radius:8px;background:#edf1f7;color:#18375d;font-size:12px;font-weight:800;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.ans.sel .ans-num{background:#18375d;color:#fff}
.note{font-size:12px;color:#b7840a;background:#fff8ec;border:1px solid #ffd490;border-radius:10px;padding:10px 12px;margin-bottom:12px;line-height:1.5}
.profil{border-left:4px solid #77cd8a}
.kw-row{display:flex;flex-wrap:wrap;gap:6px;margin-top:12px}
.kw{display:inline-flex;align-items:center;border:1px solid #c5cfdc;background:#edf1f7;color:#18375d;border-radius:999px;padding:4px 10px;font-size:11px;font-weight:800}

.socio-hint{font-size:12px;color:#64748b;background:#f8fafc;border:1px solid #e2e8f0;border-radius:10px;padding:10px 12px;margin-bottom:12px;line-height:1.45}
.result-card{background:#fff;border-radius:14px;box-shadow:0 1px 8px rgba(0,0,0,.06);margin-bottom:12px;overflow:hidden}
.result-head{padding:22px 20px;border-left:4px solid #77cd8a}
.result-chapter{font-size:12px;color:#18375d;margin-bottom:14px;line-height:1.35}
.result-title{font-size:20px;font-weight:800;color:#001b3f;line-height:1.25;margin-bottom:6px}
.result-desc{font-size:13px;color:#001b3f;line-height:1.55;margin-bottom:14px}
.result-toggle{width:100%;display:flex;align-items:center;justify-content:center;gap:10px;border:none;background:#fff;color:#18375d;font-size:12px;font-weight:800;font-family:'Asap',sans-serif;cursor:pointer;padding:9px 18px;border-top:1px solid #e2e8f0}
.result-toggle:before,.result-toggle:after{content:"";height:1px;background:#d8e0ea;flex:1}
.coll-panel{display:none;padding:0 20px 20px;background:#fff}
.coll-panel.open{display:grid;grid-template-columns:110px 1fr;gap:18px;align-items:center}
.coll-box{background:#f8fafc;border-radius:8px;padding:14px 12px;color:#001b3f}
.coll-pct{font-size:28px;font-weight:900;line-height:1}.coll-pct span{font-size:14px}.coll-lbl{font-size:11px;line-height:1.35;margin-top:6px;color:#18375d}
.coll-bars{display:flex;flex-direction:column;gap:7px}.coll-line{display:grid;grid-template-columns:1fr 1.3fr;gap:9px;align-items:center;font-size:11px;color:#18375d;line-height:1.35}.coll-track{height:6px;border-radius:6px;background:#e8edf4;overflow:hidden}.coll-fill{height:100%;border-radius:6px;background:#77cd8a}.coll-fill.mid{background:#ffc744}.coll-fill.bad{background:#ff847e}
@media(max-width:560px){.coll-panel.open{grid-template-columns:1fr}.result-title{font-size:18px}}


/* ── Correctifs responsive iPhone / mobile ───────────────── */
@media (max-width: 760px){
  body{overflow-x:hidden;}
  .topbar{height:auto;min-height:54px;padding:10px 14px;gap:8px;flex-wrap:wrap;position:sticky;top:0;z-index:80;}
  .logo-img{height:26px;max-width:150px;object-fit:contain;}
  .main-nav{order:3;width:100%;margin-left:0;overflow-x:auto;max-width:100%;padding-bottom:2px;-webkit-overflow-scrolling:touch;}
  .main-nav a{white-space:nowrap;font-size:12px;padding:7px 9px;}
  .acct{padding:4px 8px 4px 4px;}
  .acct-n{display:none;}
  .subnav{padding:8px 12px;-webkit-overflow-scrolling:touch;}
  .breadcrumb{padding:9px 14px;}
  .stepper-wrap{padding:12px 14px;-webkit-overflow-scrolling:touch;}
  .stepper{min-width:520px;}
  .step-label{font-size:11px;}
  .page-wrap{padding:18px 14px 46px;max-width:100%;}
  .page-title{font-size:19px;line-height:1.2;}
  .page-sub{font-size:12px;margin-bottom:16px;}
  .block,.card{padding:16px 14px;border-radius:12px;}
  .bottom-actions{justify-content:stretch;}
  .bottom-actions .btn,.bottom-actions button,.btn-back,.btn-continue{width:100%;justify-content:center;}
  .sidebar{position:static;top:auto;}
  .launch-url-box,.template-head,.chap-head,.q-header,.profile-head{align-items:flex-start;}
  .btn-copy,.btn-test,.btn-secondary,.btn-ai,.btn-primary,.btn-add,.btn-danger{width:100%;justify-content:center;}
  input,select,textarea,button{font-size:16px;}
}
@media (max-width: 520px){
  .stepper{min-width:470px;}
  .step-circle{width:24px;height:24px;font-size:11px;}
  .step-connector{margin:0 7px;min-width:12px;}
}

.preview-close{position:fixed;top:10px;right:12px;z-index:9999;width:38px;height:38px;border:none;border-radius:999px;background:#18375d;color:#fff;font-size:22px;font-weight:900;line-height:1;display:flex;align-items:center;justify-content:center;cursor:pointer;box-shadow:0 10px 24px rgba(15,30,55,.22);pointer-events:auto}
.preview-close:hover{background:#0d4c72}
.preview-close:focus{outline:3px solid rgba(0,120,131,.24);outline-offset:2px}
@media(max-width:760px){.preview-close{top:8px;right:8px;width:40px;height:40px}}

</style>
</head>
<body>
<div id="app"></div>
<script src="app.js"></script>
<script>
let state = {};
let step="home", ci=0, qi=0, selected=null, scores=[], socioChoices={}, finalOpen={};
const previewParams = new URLSearchParams(window.location.search);
const previewMode = previewParams.get("preview") || "";
const previewFrom = previewParams.get("from") || "";
// Depuis l’onglet Profils, l’aperçu répondant doit ignorer la page socio-démo
// car elle n’est pas encore paramétrée à cette étape.
if(previewMode === "respondent" || previewFrom === "profiles") step = "question";
if(previewMode === "final") step = "final";

async function loadPreviewState(){
  let loaded = {};
  try{
    if(typeof itsBootstrapProjectFromUrl === "function") loaded = await itsBootstrapProjectFromUrl();
  }catch(e){ console.warn("Chargement projet aperçu impossible", e); }
  if(!loaded || typeof loaded !== "object" || !Array.isArray(loaded.chapters)){
    loaded = (typeof itsLoad === "function") ? itsLoad() : {};
  }
  return loaded || {};
}


function closePreview(){
  try{
    if(window.parent && window.parent !== window && typeof window.parent.closePassationPreview === "function"){
      window.parent.closePassationPreview();
      return;
    }
  }catch(e){}
  try{
    window.close();
    setTimeout(()=>{
      if(!window.closed){
        if(document.referrer){ window.location.href = document.referrer; }
        else { history.back(); }
      }
    }, 120);
  }catch(e){
    if(document.referrer){ window.location.href = document.referrer; }
    else { history.back(); }
  }
}


function title(){ return state.meta?.titre || state.title || "Autodiagnostic"; }
function totalQ(){ return state.chapters.reduce((a,c)=>a+(c.questions||[]).length,0); }
function currentQuestion(){ return state.chapters[ci].questions[qi]; }
function esc(s){ return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }
function escAttr(s){ return esc(s).replace(/"/g,"&quot;").replace(/'/g,"&#039;"); }
function resourceUrl(r){
  const raw = r?.url || r?.link || r?.href || r?.lien || r?.linkUrl || r?.link_url || "";
  const clean = String(raw || "").trim();
  if(!clean) return "";
  return /^https?:\/\//i.test(clean) ? clean : "";
}
function finalResources(){
  const fromParam = state?.parametrage?.resources;
  if(Array.isArray(fromParam) && fromParam.length) return fromParam;
  const fromRoot = state?.resources;
  return Array.isArray(fromRoot) ? fromRoot : [];
}
function profileKeywords(p){ return (p?.keywords || p?.motscles || []).filter(Boolean); }
const PROFILE_COLORS = ['#ff847e', '#ffc744', '#77cd8a'];
function profileIndexForScore(profiles, avg){
  const list = Array.isArray(profiles) ? profiles : [];
  const found = list.findIndex(x => avg >= Number(x.min ?? 0) && avg <= Number(x.max ?? 2));
  return found >= 0 ? found : Math.min(1, Math.max(0, list.length - 1));
}
function profileBorderColor(index){
  return PROFILE_COLORS[index] || PROFILE_COLORS[1];
}

function render(){
  if(step==="home") return renderHome();
  if(step==="question") return renderQuestion();
  if(step==="chapter") return renderChapter();
  if(step==="final") return renderFinal();
}

function renderHome(){
  document.getElementById("app").innerHTML = `
  <div class="hbar"><div class="hbar-title">${esc(title())}</div></div>
  <div class="page">
    <div class="note">Aperçu de passation : les résultats affichés sont simulés.</div>
    <div class="hero-wrap">
      <div class="hero-img"><div style="font-size:60px;color:#fff">✓</div></div>
      <div class="hero-body">
        <div class="hero-sup">Autodiagnostic Into The Shift</div>
        <div class="hero-title">${esc(title())}</div>
        <div style="display:flex;justify-content:center;gap:30px;color:#007883;font-weight:800">
          <div>${state.chapters.length} parties</div><div>${state.duration||"5 à 7 min"}</div>
        </div>
      </div>
    </div>
    <div class="card" style="font-size:14px;line-height:1.65;color:#475569">${esc(state.intro||"")}</div>
    <button class="btn btn-primary" onclick="step='socio';renderSocio()">Commencer le test</button>
  </div>`;
}

function selectSocio(si,oi){
  socioChoices[si]=oi;
  renderSocio();
}

function renderSocio(){
  const demos = state.parametrage?.sociodemo || state.demographics || [];
  document.getElementById("app").innerHTML = `
  <div class="hbar"><div class="hbar-title">${esc(title())}</div></div>
  <div class="page">
    <div class="note">Aperçu : données socio-démo issues du paramétrage.</div>
    <div class="socio-hint">Dans l’aperçu, vous pouvez cliquer sur une réponse pour simuler le parcours. Ces choix ne sont pas enregistrés.</div>
    ${demos.map((d,si)=>`
      <div class="card">
        <div class="q-text">${esc(d.q || d.question)} *</div>
        ${(d.opts||d.options||[]).map((o,i)=>{
          const label = typeof o === 'object' ? (o.label || o.text || o.value || '') : o;
          return `<div class="ans ${socioChoices[si]===i?'sel':''}" onclick="selectSocio(${si},${i})"><div class="ans-num">${i+1}</div><div>${esc(label)}</div></div>`;
        }).join("")}
      </div>
    `).join("")}
    <button class="btn btn-primary" onclick="step='question';render()">Étape suivante</button>
  </div>`;
}

function renderQuestion(){
  const q = currentQuestion();
  document.getElementById("app").innerHTML = `
  <div class="hbar"><div class="hbar-title">${esc(title())}</div></div>
  <div class="page">
    <div class="card"><div style="font-size:12px;color:#64748b;font-weight:700">Partie ${ci+1}/${state.chapters.length} · Question ${qi+1}/${state.chapters[ci].questions.length}</div></div>
    <div class="card">
      <div class="q-text">${esc(q.text)} *</div>
      ${(q.answers||[]).map((a,i)=>`<div class="ans ${selected===i?'sel':''}" onclick="selected=${i};render()"><div class="ans-num">${i+1}</div><div>${esc(a.text)}</div></div>`).join("")}
    </div>
    <button class="btn btn-primary" ${selected===null?'disabled':''} onclick="nextQuestion()">Continuer</button>
  </div>`;
}

function nextQuestion(){
  const q = currentQuestion();
  scores.push((q.answers[selected]||{}).score || 0);
  selected=null;
  if(qi < state.chapters[ci].questions.length-1){ qi++; step="question"; }
  else { step="chapter"; }
  render();
}

function renderChapter(){
  const avg = scores.slice(-state.chapters[ci].questions.length).reduce((a,b)=>a+b,0)/state.chapters[ci].questions.length;
  const profiles = state.chapters[ci].profiles || [];
  const profileIndex = profileIndexForScore(profiles, avg);
  const p = profiles[profileIndex] || profiles[1] || {};
  const borderColor = profileBorderColor(profileIndex);
  document.getElementById("app").innerHTML = `
  <div class="hbar"><div class="hbar-title">${esc(title())}</div></div>
  <div class="page">
    <div class="note">Résultat simulé pour l’aperçu.</div>
    <div class="card profil" style="border-left-color:${borderColor}">
      <div style="font-size:12px;color:#64748b;font-weight:700">Fin du chapitre ${ci+1} — ${esc(state.chapters[ci].title)}</div>
      <h2 style="font-size:20px;margin:10px 0">${esc(p.title)}</h2>
      <p style="font-size:13px;color:#475569;line-height:1.65">${esc(p.description)}</p>
    </div>
    <button class="btn btn-primary" onclick="nextChapter()">${ci===state.chapters.length-1?'Voir mon résultat':'Chapitre suivant →'}</button>
  </div>`;
}

function nextChapter(){
  if(ci < state.chapters.length-1){ ci++; qi=0; step="question"; }
  else step="final";
  render();
}

function simulatedDistribution(index){
  const sets = [
    [{pct:14,label:'Vous devez progresser sur ce thème',cls:'bad'},{pct:56,label:'Vous avez ce même profil',cls:'good'},{pct:30,label:'Vous pouvez encore progresser',cls:'mid'}],
    [{pct:22,label:'Vous devez progresser sur ce thème',cls:'bad'},{pct:47,label:'Vous avez ce même profil',cls:'good'},{pct:31,label:'Vous pouvez encore progresser',cls:'mid'}],
    [{pct:18,label:'Vous devez progresser sur ce thème',cls:'bad'},{pct:52,label:'Vous avez ce même profil',cls:'good'},{pct:30,label:'Vous pouvez encore progresser',cls:'mid'}]
  ];
  return sets[index % sets.length];
}
function toggleColleagues(index){
  finalOpen[index]=!finalOpen[index];
  renderFinal();
}
function profileShortTitle(p){
  return String(p?.title || p?.titre || 'Profil simulé').trim();
}
function profileSummary(p){
  return String(p?.summary || p?.phrase || p?.description || p?.desc || '').trim();
}

function renderFinal(){
  document.getElementById("app").innerHTML = `
  <div class="hbar"><div class="hbar-title">${esc(title())}</div></div>
  <div class="page">
    <div class="note">Résultats simulés pour l’aperçu. Les pourcentages ci-dessous illustrent le rendu final avec comparaison collective.</div>
    <div class="card" style="text-align:center"><div style="font-size:20px;font-weight:800">Récapitulatif de vos résultats</div></div>
    ${state.chapters.map((c,i)=>{
      const p = (c.profiles||[])[1] || (c.profils||[])[1] || (c.profiles||[])[0] || (c.profils||[])[0] || {};
      const kws = profileKeywords(p);
      const border = profileBorderColor(2);
      const dist = simulatedDistribution(i);
      const same = dist.find(x=>x.label.includes('même profil')) || dist[1];
      const open = !!finalOpen[i];
      return `<div class="result-card">
        <div class="result-head" style="border-left-color:${border}">
          <div class="result-chapter">${i+1}. ${esc(c.title)}</div>
          <div class="result-title">${esc(profileShortTitle(p))}</div>
          <div class="result-desc">${esc(profileSummary(p))}</div>
          ${kws.length ? `<div class="kw-row">${kws.map(k=>`<span class="kw">${esc(k)}</span>`).join('')}</div>` : ''}
        </div>
        <button type="button" class="result-toggle" onclick="toggleColleagues(${i})">${open?'Masquer':'Afficher'} le résultat de mes collègues</button>
        <div class="coll-panel ${open?'open':''}">
          <div class="coll-box"><div class="coll-pct">${same.pct}<span> %</span></div><div class="coll-lbl">de vos collègues ont le même profil que vous</div></div>
          <div class="coll-bars">
            ${dist.map(x=>`<div class="coll-line"><div class="coll-track"><div class="coll-fill ${x.cls}" style="width:${x.pct}%"></div></div><div><strong>${x.pct}%</strong> - ${esc(x.label)}</div></div>`).join('')}
          </div>
        </div>
      </div>`;
    }).join("")}
    <div class="card"><div style="font-size:13px;font-weight:800;margin-bottom:10px">Pour approfondir</div>${finalResources().map(r=>{
      const url = resourceUrl(r);
      return `<div style="padding:10px;border:1px solid #e2e8f0;border-radius:8px;margin-bottom:7px">
        <div>${esc(r.titre || r.title || r.nom || r.name || "Ressource")}</div>
        ${url ? `<a href="${escAttr(url)}" target="_blank" rel="noopener" onclick="event.stopPropagation()" style="display:inline-flex;margin-top:8px;font-size:12px;font-weight:800;color:#0d4c72;text-decoration:none;pointer-events:auto;position:relative;z-index:2">Tester le lien</a>` : ""}
      </div>`;
    }).join("")}</div>
  </div>`;
}

async function bootPreview(){
  state = await loadPreviewState();
  if(!state || !Array.isArray(state.chapters) || !state.chapters.length){
    document.getElementById("app").innerHTML="<div class='page'><div class='card'>Aucun autodiagnostic chargé.</div></div>";
    return;
  }
  render();
}
bootPreview();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aperçu récap final — Into The Shift</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fontsource/asap@5/index.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Asap',sans-serif;background:#eef0f4;min-height:100vh;color:#18375d}
.hbar{background:#fff;border-bottom:1px solid #e2e8f0;padding:11px 24px;text-align:center;position:sticky;top:0;z-index:10}
.hbar-title{font-size:13px;font-weight:600;color:#64748b}
.page{max-width:680px;margin:0 auto;padding:20px 16px 56px}
.card{background:#fff;border-radius:14px;padding:22px 20px;box-shadow:0 1px 8px rgba(0,0,0,.06);margin-bottom:12px}
.note{font-size:12px;color:#8a5a00;background:#fff8ec;border:1px solid #ffd490;border-radius:10px;padding:11px 13px;margin-bottom:12px;line-height:1.5}
.intro{text-align:center}
.intro h1{font-size:22px;line-height:1.25;margin-bottom:8px;color:#18375d}
.intro p{font-size:13px;color:#64748b;line-height:1.55}
.profil{border-left:4px solid #77cd8a}
.profil.red{border-left-color:#ff847e}
.profil.orange{border-left-color:#ffc744}
.profil.green{border-left-color:#77cd8a}
.profil-top{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;margin-bottom:8px}
.chapter-title{font-size:12px;color:#64748b;font-weight:800;line-height:1.35}
.badge{font-size:10px;font-weight:900;text-transform:uppercase;letter-spacing:.05em;border-radius:999px;padding:4px 9px;white-space:nowrap}
.badge.red{background:#fff0ef;color:#c0392b;border:1px solid #ffd6d4}
.badge.orange{background:#fff9ec;color:#b7840a;border:1px solid #ffedb8}
.badge.green{background:#f0fbf2;color:#27823a;border:1px solid #b8e8c0}
h2{font-size:17px;margin:8px 0;color:#18375d;line-height:1.3}
.summary{font-size:13px;color:#64748b;font-style:italic;line-height:1.55}
.kw-row{display:flex;flex-wrap:wrap;gap:6px;margin-top:12px}
.kw{display:inline-flex;align-items:center;border:1px solid #c5cfdc;background:#edf1f7;color:#18375d;border-radius:999px;padding:4px 10px;font-size:11px;font-weight:800}
.empty{font-size:13px;color:#64748b;line-height:1.55}
.resource{padding:10px;border:1px solid #e2e8f0;border-radius:8px;margin-bottom:7px;font-size:13px;color:#475569}
@media(max-width:760px){.page{padding:16px 14px 46px}.card{padding:16px 14px}.profil-top{display:block}.badge{display:inline-flex;margin-top:8px}}
</style>
</head>
<body>
<div id="app"></div>
<script src="app.js"></script>
<script>
let state = (typeof itsLoad === 'function') ? itsLoad() : {};

function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function title(){ return state.meta?.titre || state.title || 'Autodiagnostic'; }
function profileKeywords(p){ return (p?.keywords || p?.motscles || []).filter(Boolean); }
function profileLabel(p, fallback){ return p?.level || p?.niveau || p?.label || fallback || 'Profil simulé'; }
function cleanHtmlText(v){
  const d = document.createElement('div');
  d.innerHTML = v || '';
  return d.textContent || d.innerText || '';
}
function pickProfile(chapter, index){
  const profiles = chapter.profiles || chapter.profils || [];
  if(!profiles.length) return {};
  return profiles[index % Math.min(profiles.length, 3)] || profiles[0] || {};
}
function tone(index){ return ['red','orange','green'][index % 3]; }
function toneLabel(index, p){
  const fallback = ['Profil à consolider','Profil intermédiaire','Profil ancré'][index % 3];
  return profileLabel(p, fallback);
}
function render(){
  const chapters = Array.isArray(state.chapters) ? state.chapters : [];
  if(!chapters.length){
    document.getElementById('app').innerHTML = `<div class="page"><div class="card empty">Aucun autodiagnostic chargé.</div></div>`;
    return;
  }

  document.getElementById('app').innerHTML = `
    <div class="hbar"><div class="hbar-title">Aperçu récap final — ${esc(title())}</div></div>
    <div class="page">
      <div class="note"><strong>Aperçu fictif.</strong> Cette page n’est pas une vraie page de résultat : elle sert uniquement à visualiser le rendu final avec des profils volontairement variés. Les résultats réels dépendront des réponses des collaborateurs.</div>
      <div class="card intro">
        <h1>Récapitulatif de vos résultats</h1>
        <p>Exemple de restitution finale affichant le titre et le résumé de chaque profil. Les descriptions détaillées restent réservées aux retours de fin de chapitre pendant la passation.</p>
      </div>
      ${chapters.map((c,i)=>{
        const p = pickProfile(c, i);
        const t = tone(i);
        const kws = profileKeywords(p);
        const chapterTitle = c.title || c.name || `Chapitre ${i+1}`;
        const summary = p.summary || p.phrase || p.resume || '';
        return `<div class="card profil ${t}">
          <div class="profil-top">
            <div class="chapter-title">${i+1}. ${esc(chapterTitle)}</div>
            <div class="badge ${t}">${esc(toneLabel(i, p))}</div>
          </div>
          <h2>${esc(p.title || p.titre || 'Profil simulé')}</h2>
          ${summary ? `<p class="summary">${esc(cleanHtmlText(summary))}</p>` : ''}
          ${kws.length ? `<div class="kw-row">${kws.map(k=>`<span class="kw">${esc(k)}</span>`).join('')}</div>` : ''}
        </div>`;
      }).join('')}
      ${(state.resources||[]).length ? `<div class="card"><div style="font-size:13px;font-weight:800;margin-bottom:10px">Pour approfondir</div>${(state.resources||[]).map(r=>`<div class="resource">${esc(r.titre || r.title || r.name || '')}</div>`).join('')}</div>` : ''}
    </div>`;
}
render();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mes autodiagnostics - Into The Shift</title>

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fontsource/asap@5/index.css">
  <link rel="stylesheet" href="style.css">

  <style>
    *{box-sizing:border-box}
    body{margin:0;font-family:'Asap',sans-serif;background:#f5f7fb;color:#18375d}
    .page{max-width:1180px;margin:0 auto;padding:28px 20px 48px}
    .hero{display:flex;justify-content:space-between;align-items:flex-start;gap:18px;margin-bottom:18px}
    .hero h1{font-size:28px;margin:0 0 8px;color:#18375d}
    .hero p{margin:0;color:#64748b;font-size:15px;line-height:1.5;max-width:720px}
    .btn-primary{background:#eb6366;color:#fff;border:none;border-radius:10px;padding:12px 18px;font-weight:700;font-size:14px;cursor:pointer;font-family:'Asap',sans-serif;white-space:nowrap}
    .btn-primary:hover{background:#d94f52}

    .stats{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:12px;margin:18px 0}
    .stat{background:#fff;border:1px solid #d8e0ea;border-radius:14px;padding:16px}
    .stat strong{display:block;font-size:24px;color:#18375d;margin-bottom:4px}
    .stat span{font-size:13px;color:#64748b}

    .toolbar{background:#fff;border:1px solid #d8e0ea;border-radius:14px;padding:14px;display:flex;gap:10px;align-items:center;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap}
    .tabs{display:flex;gap:8px;flex-wrap:wrap}
    .tab{border:1px solid #d8e0ea;background:#fff;color:#64748b;border-radius:999px;padding:8px 13px;font-size:13px;font-weight:700;cursor:pointer;font-family:'Asap',sans-serif}
    .tab.active{background:#18375d;color:#fff;border-color:#18375d}
    .search{min-width:250px;flex:1;max-width:360px}
    .search input{width:100%;border:1px solid #d8e0ea;border-radius:10px;padding:10px 12px;font-family:'Asap',sans-serif;font-size:14px}

    .list{display:flex;flex-direction:column;gap:10px}
    .card{background:#fff;border:1px solid #d8e0ea;border-radius:16px;padding:16px;display:grid;grid-template-columns:5px 1fr auto;gap:14px;align-items:center;position:relative}
    .bar{width:5px;height:100%;min-height:76px;border-radius:8px;background:#c5ccd5}
    .bar.draft{background:#94a3b8}
    .bar.submitted{background:#ffc744}
    .bar.published{background:#007883}
    .bar.results{background:#77CD8a}
    .bar.archived{background:#cbd5e1}

    .title{font-size:16px;font-weight:800;color:#18375d;margin-bottom:5px}
    .meta{font-size:13px;color:#64748b;line-height:1.5}
    .tags{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}
    .tag{font-size:12px;font-weight:700;border-radius:999px;background:#edf1f7;color:#18375d;border:1px solid #d0d8e8;padding:4px 9px}
    .status{display:inline-flex;align-items:center;border-radius:999px;padding:5px 10px;font-size:12px;font-weight:800;margin-bottom:10px}
    .status.draft{background:#edf1f7;color:#475569}
    .status.submitted{background:#fff4d5;color:#9a6700}
    .status.published{background:#e5f4f5;color:#007883}
    .status.results{background:#e8f8ef;color:#22824d}
    .status.archived{background:#f1f4f8;color:#94a3b8}

    .actions{display:flex;flex-direction:column;gap:8px;align-items:flex-end}
    .row-actions{display:flex;gap:7px;flex-wrap:wrap;justify-content:flex-end}
    .btn{border:1px solid #d8e0ea;background:#fff;color:#18375d;border-radius:9px;padding:8px 12px;font-size:13px;font-weight:700;cursor:pointer;font-family:'Asap',sans-serif}
    .btn:hover{background:#f7f9fc}
    .btn-blue{background:#18375d;color:#fff;border-color:#18375d}
    .btn-blue:hover{background:#122a47}
    .btn-green{background:#e5f4f5;color:#007883;border-color:#b8dfe0}
    .btn-red{background:#fceaea;color:#c24141;border-color:#f4c6c6}
    .btn[disabled]{opacity:.45;cursor:not-allowed}
    .contact-note{font-size:12px;color:#64748b;line-height:1.35;text-align:right;max-width:280px}
    .contact-note a{color:#18375d;font-weight:800;text-decoration:none}
    .contact-note a:hover{text-decoration:underline}

    .empty{background:#fff;border:1px dashed #cbd5e1;border-radius:16px;text-align:center;padding:48px 20px;color:#64748b}
    .empty strong{display:block;color:#18375d;font-size:18px;margin-bottom:8px}

    .menu{position:absolute;right:16px;top:74px;background:#fff;border:1px solid #d8e0ea;border-radius:12px;box-shadow:0 14px 35px rgba(24,55,93,.14);min-width:250px;z-index:20;display:none;overflow:hidden}
    .menu.open{display:block}
    .menu button{display:block;width:100%;border:0;background:#fff;text-align:left;padding:11px 14px;font-family:'Asap',sans-serif;font-size:13px;font-weight:700;color:#18375d;cursor:pointer}
    .menu button:hover{background:#f7f9fc}
    .menu .danger{color:#c24141}
    .sep{height:1px;background:#edf1f6;margin:3px 0}

    @media(max-width:850px){
      .hero{flex-direction:column}
      .stats{grid-template-columns:repeat(2,1fr)}
      .card{grid-template-columns:5px 1fr}
      .actions{grid-column:2;align-items:flex-start}
      .row-actions{justify-content:flex-start}
    }
  </style>
</head>

<body>
  <div id="header"></div>
  <script src="header.js"></script>

  <main class="page">
    <section class="hero">
      <div>
        <h1>Mes autodiagnostics</h1>
        <p>
          Retrouvez ici tous vos autodiagnostics : brouillons, configurations transmises à Into The Shift,
          campagnes publiées, liens de diffusion et accès aux résultats.
        </p>
      </div>
      <button class="btn-primary" onclick="window.location.href='index.html'">+ Créer un autodiagnostic</button>
    </section>

    <section class="stats">
      <div class="stat"><strong id="countAll">0</strong><span>Total</span></div>
      <div class="stat"><strong id="countDraft">0</strong><span>Brouillons</span></div>
      <div class="stat"><strong id="countSubmitted">0</strong><span>Transmis</span></div>
      <div class="stat"><strong id="countPublished">0</strong><span>Publiés / résultats</span></div>
    </section>

    <section class="toolbar">
      <div class="tabs">
        <button class="tab active" data-filter="all">Tous</button>
        <button class="tab" data-filter="draft">Brouillons</button>
        <button class="tab" data-filter="submitted">Transmis</button>
        <button class="tab" data-filter="published">Publiés</button>
        <button class="tab" data-filter="results">Résultats disponibles</button>
      </div>
      <div class="search">
        <input id="searchInput" type="search" placeholder="Rechercher un autodiagnostic..." />
      </div>
    </section>

    <section class="list" id="adList"></section>
  </main>

  <script>
    const API_BASE =
      window.ITS_API_BASE ||
      localStorage.getItem("its_api_base") ||
      "https://into-the-shift-studio-api.osc-fr1.scalingo.io";

    let projects = [];
    let currentFilter = "all";

    function token() {
      return localStorage.getItem("its_token") || localStorage.getItem("token") || localStorage.getItem("auth_token") || "";
    }

    function parseData(p){
      let d = p?.data || {};
      if(typeof d === "string"){ try{ d = JSON.parse(d); }catch(e){ d = {}; } }
      return d && typeof d === "object" ? d : {};
    }

    function normalizeStatus(project) {
      const raw = String(project.status || project.project_status || "").toLowerCase();
      const d = parseData(project);
      if (raw === "results" || raw.includes("result") || project.resultsUrl || project.results_url) return "results";
      if (raw === "published" || raw.includes("publi")) return "published";
      if (raw === "sent" || raw.includes("transmis") || raw.includes("submitted") || d.configTransmise || d.config_transmise || d.submitted) return "submitted";
      if (raw.includes("archiv")) return "archived";
      return "draft";
    }

    function statusLabel(status) {
      return {
        draft: "Brouillon",
        submitted: "Transmis à Into The Shift",
        published: "Publié",
        results: "Résultats disponibles",
        archived: "Archivé"
      }[status] || "Brouillon";
    }

    function formatDate(value) {
      if (!value) return "—";
      try { return new Date(value).toLocaleDateString("fr-FR"); } catch { return "—"; }
    }

    function getTitle(p) {
      const d = parseData(p);
      const prm = d.parametrage || d.meta || {};
      return p.title || d.autodiagTitle || d.title || d.titre || prm.titre || prm.nom || "Autodiagnostic sans titre";
    }

    function deepFindTheme(obj, depth = 0) {
      if (!obj || depth > 5) return "";
      if (typeof obj === "string") return "";
      if (Array.isArray(obj)) {
        for (const item of obj) { const found = deepFindTheme(item, depth + 1); if (found) return found; }
        return "";
      }
      const keys = ["theme", "thematique", "thématique", "selectedTheme", "themeLabel", "themeName", "category", "topic", "subject"];
      for (const key of keys) {
        const value = obj[key];
        if (!value) continue;
        if (typeof value === "string" && value.trim()) return value.trim();
        if (typeof value === "object") {
          const label = value.title || value.name || value.label || value.titre || value.nom;
          if (label) return String(label).trim();
        }
      }
      for (const key of ["data", "payload", "meta", "config", "parametrage", "settings", "source", "base", "catalogue", "template"]) {
        const found = deepFindTheme(obj[key], depth + 1);
        if (found) return found;
      }
      return "";
    }

    function inferThemeFromTitle(title) {
      const t = String(title || "").toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "");
      if (t.includes("rps") || t.includes("qvt")) return "QVT & RPS";
      if (t.includes("fraude") || t.includes("cyber") || t.includes("phishing")) return "Cybersécurité";
      if (t.includes("securite") || t.includes("surete")) return "Sécurité & sûreté au travail";
      if (t.includes("transformation") || t.includes("management") || t.includes("manager")) return "Transformation & management";
      if (t.includes("rse") || t.includes("environnement")) return "RSE";
      if (t.includes("ethique") || t.includes("compliance") || t.includes("conformite")) return "Éthique & compliance";
      return "";
    }

    function getTheme(p) { return deepFindTheme(p) || inferThemeFromTitle(getTitle(p)) || "Thématique non renseignée"; }

    function getCampaignDates(p) {
      const d = parseData(p);
      const prm = d.parametrage || {};
      const start = p.campaign_start_date || p.start_date || prm.date_lancement || prm.dateLancement;
      const end = p.campaign_end_date || p.end_date || prm.date_cloture || prm.dateCloture;
      if (!start && !end) return "Dates de campagne non renseignées";
      return `Campagne : ${formatDate(start)} → ${formatDate(end)}`;
    }

    function getShareUrl(p){ return p.shareUrl || p.share_url || p.ad_url || p.public_url || ""; }
    function getResultsUrl(p){ return p.resultsUrl || p.results_url || p.result_url || ""; }

    function openExternal(url) { if (url) window.open(url, "_blank", "noopener,noreferrer"); }
    function copyText(text) { if (!text) return alert("Aucun lien n’est encore disponible."); navigator.clipboard.writeText(text); alert("Lien copié."); }

    async function api(path, opts={}){
      const res = await fetch(API_BASE + path, { ...opts, headers:{ "Content-Type":"application/json", "Authorization":"Bearer " + token(), ...(opts.headers||{}) }});
      if(!res.ok){ const e = await res.json().catch(()=>({})); throw new Error(e.error || "Erreur API"); }
      return await res.json();
    }

    function renderStats() {
      const counts = { draft:0, submitted:0, published:0, results:0 };
      projects.forEach(p => counts[normalizeStatus(p)] = (counts[normalizeStatus(p)] || 0) + 1);
      document.getElementById("countAll").textContent = projects.length;
      document.getElementById("countDraft").textContent = counts.draft || 0;
      document.getElementById("countSubmitted").textContent = counts.submitted || 0;
      document.getElementById("countPublished").textContent = (counts.published || 0) + (counts.results || 0);
    }

    function renderProjects() {
      const list = document.getElementById("adList");
      const q = document.getElementById("searchInput").value.trim().toLowerCase();
      const filtered = projects.filter(p => {
        const status = normalizeStatus(p);
        const text = `${getTitle(p)} ${getTheme(p)}`.toLowerCase();
        return (currentFilter === "all" || status === currentFilter) && (!q || text.includes(q));
      });

      if (!filtered.length) {
        list.innerHTML = `<div class="empty"><strong>Aucun autodiagnostic trouvé</strong>Aucun élément ne correspond à ce filtre.</div>`;
        return;
      }

      list.innerHTML = filtered.map((p, index) => {
        const status = normalizeStatus(p);
        const title = getTitle(p);
        const theme = getTheme(p);
        const shareUrl = getShareUrl(p);
        const resultsUrl = getResultsUrl(p);
        const canResume = status === "draft" || status === "submitted";
        const canClone = status === "submitted" || status === "published" || status === "results";
        const showShare = (status === "published" || status === "results") && Boolean(shareUrl);
        const showResults = status === "results" && Boolean(resultsUrl);
        const id = p.id || p.project_id || "";

        return `
          <article class="card">
            <div class="bar ${status}"></div>
            <div>
              <div class="title">${escapeHtml(title)}</div>
              <div class="meta">
                Créé le ${formatDate(p.created_at || p.createdAt)} · ${getCampaignDates(p)}<br>
                ${showShare ? "Lien de diffusion disponible" : "Lien de diffusion disponible après publication par Into The Shift"} ·
                ${showResults ? "Résultats disponibles" : "Résultats non disponibles"}
              </div>
              <div class="tags"><span class="tag">${escapeHtml(theme)}</span>${p.passations_used !== undefined ? `<span class="tag">${p.passations_used} passations</span>` : ""}</div>
            </div>
            <div class="actions">
              <span class="status ${status}">${statusLabel(status)}</span>
              <div class="row-actions">
                ${canResume ? `<button class="btn btn-blue" onclick="resumeProject('${escapeAttr(id)}')">Reprendre là où je me suis arrêté</button>` : ""}
                ${showShare ? `<button class="btn btn-green" onclick="openExternal('${escapeAttr(shareUrl)}')">Voir l’AD</button>` : ""}
                ${showResults ? `<button class="btn" onclick="openExternal('${escapeAttr(resultsUrl)}')">Résultats</button>` : ""}
                <button class="btn" onclick="toggleMenu(${index})">···</button>
              </div>
              ${!canResume && !showShare && status !== "archived" ? `<div class="contact-note">Publication en cours côté Into The Shift.</div>` : ""}
            </div>
            <div class="menu" id="menu-${index}">
              ${canResume ? `<button onclick="resumeProject('${escapeAttr(id)}')">Reprendre là où je me suis arrêté</button>` : ""}
              ${showShare ? `<button onclick="copyText('${escapeAttr(shareUrl)}')">Copier le lien de diffusion</button>` : ""}
              ${showResults ? `<button onclick="copyText('${escapeAttr(resultsUrl)}')">Copier le lien résultats</button>` : ""}
              ${showShare || showResults || canResume ? `<div class="sep"></div>` : ""}
              <button ${canClone ? "" : "disabled"} onclick="duplicateProject('${escapeAttr(id)}')">Cloner${canClone ? "" : " — disponible après transmission"}</button>
              ${status === "draft" ? `<button class="danger" onclick="archiveProject('${escapeAttr(id)}')">Archiver</button>` : ""}
            </div>
          </article>`;
      }).join("");
    }

    function toggleMenu(index) {
      document.querySelectorAll(".menu").forEach(m => m.classList.remove("open"));
      const menu = document.getElementById(`menu-${index}`);
      if (menu) menu.classList.toggle("open");
    }

    document.addEventListener("click", e => {
      if (!e.target.closest(".menu") && !e.target.closest(".btn")) document.querySelectorAll(".menu").forEach(m => m.classList.remove("open"));
    });

    document.querySelectorAll(".tab").forEach(tab => {
      tab.addEventListener("click", () => {
        document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
        tab.classList.add("active");
        currentFilter = tab.dataset.filter;
        renderProjects();
      });
    });
    document.getElementById("searchInput").addEventListener("input", renderProjects);

    async function resumeProject(id) {
      if (!id) return alert("Projet introuvable.");
      if (typeof itsOpenProject === "function") return itsOpenProject(id);
      const data = await api(`/api/projects/${encodeURIComponent(id)}`);
      localStorage.setItem("its_current_project_id", id);
      localStorage.setItem("its_current_ad_id", id);
      localStorage.setItem("intotheshift_customizer_state_v1", JSON.stringify(data.project?.data || {}));
      window.location.href = "questions.html?projectId=" + encodeURIComponent(id);
    }

    async function loadProjects() {
      try {
        const data = await api("/api/projects");
        projects = Array.isArray(data) ? data : (data.projects || data.items || []);
        localStorage.setItem("its_projects_cache", JSON.stringify(projects));
      } catch (e) {
        projects = JSON.parse(localStorage.getItem("its_projects_cache") || "[]");
      }
      renderStats();
      renderProjects();
    }

    async function duplicateProject(id) {
      if (!id) return alert("Projet introuvable.");
      try {
        const data = await api(`/api/projects/${encodeURIComponent(id)}/clone`, { method:"POST", body:JSON.stringify({}) });
        const clone = data.project;
        if (typeof itsStoreProjectLocally === "function") itsStoreProjectLocally(clone);
        alert("Autodiagnostic cloné. Vous pouvez modifier la copie sans toucher à l’original.");
        window.location.href = "questions.html?projectId=" + encodeURIComponent(clone.id);
      } catch(e) { alert(e.message || "Clonage impossible."); }
    }

    async function archiveProject(id) {
      if (!id) return alert("Projet introuvable.");
      if (!confirm("Archiver cet autodiagnostic ?")) return;
      try {
        await api(`/api/projects/${encodeURIComponent(id)}`, { method:"PUT", body:JSON.stringify({ status:"archived", currentStep:"archived" }) });
        await loadProjects();
      } catch(e) { alert(e.message || "Archivage impossible."); }
    }

    function escapeHtml(str) {
      return String(str || "").replaceAll("&", "&amp;").replaceAll("<", "&lt;").replaceAll(">", "&gt;").replaceAll('"', "&quot;").replaceAll("'", "&#039;");
    }
    function escapeAttr(str) { return escapeHtml(str).replaceAll("`", ""); }

    loadProjects();
  </script>  </script>
</body>
</html>
